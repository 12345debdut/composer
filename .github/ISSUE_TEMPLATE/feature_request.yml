name: Feature Request
description: Suggest a feature for Composer Library
labels: ["enhancement"]
assignees: ["12345debdut"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this feature solve? What use case is not covered today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches or workarounds?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, mockups, or references.
    validations:
      required: false
