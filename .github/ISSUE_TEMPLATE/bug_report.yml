name: Bug Report
description: Report a bug in Composer Library
labels: ["bug"]
assignees: ["12345debdut"]

body:
  - type: input
    id: library-version
    attributes:
      label: Library Version
      description: Which version of Composer are you using?
      placeholder: "1.0.0"
    validations:
      required: true

  - type: input
    id: android-version
    attributes:
      label: Android Version
      description: Target / device Android API level
      placeholder: "API 34 (Android 14)"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this issue?
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: code-sample
    attributes:
      label: Code Sample
      description: If applicable, provide a minimal code sample that reproduces the issue.
      render: kotlin
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context, logs, or screenshots.
    validations:
      required: false
