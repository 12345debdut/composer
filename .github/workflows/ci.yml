name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build all modules
        run: ./gradlew :composer:build :composer-compose:build :composer-bom:build :app:build

      - name: Run unit tests
        run: ./gradlew :composer:test :composer-compose:test

      - name: Check binary API compatibility
        run: ./gradlew :composer:apiCheck :composer-compose:apiCheck

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            composer/build/reports/tests/
            composer-compose/build/reports/tests/
